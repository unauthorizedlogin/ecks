name: Bug Report
description: Report a problem with the ecks RPG Framework
title: "[Bug] "
labels:
  - bug
body:

  - type: input
    id: version
    attributes:
      label: Engine Version
      description: What version of ecks are you using?
      placeholder: v0.52.196
    validations:
      required: true

  - type: checkboxes
    id: system
    attributes:
      label: Affected System
      description: Which major system is affected?
      options:
        - label: Core Framework
        - label: Addons
        - label: Data
        - label: Economy
        - label: Entity
        - label: Launch
        - label: Loot
        - label: Progression
        - label: UI
        - label: World
        - label: Documentation
        - label: Other
    validations:
      required: true

  - type: input
    id: subsystem
    attributes:
      label: Affected Subsystem
      description: If known, specify the subsystem.
      placeholder: "Example: Chunks, Teleporter, Inventory"

  - type: textarea
    id: issue
    attributes:
      label: Description
      description: Explain the issue.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: How can this issue be reproduced?
      placeholder: |
        1. Open menu
        2. Perform action
        3. Observe issue

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Logs
      description: Add screenshots, errors, or logs if available.
