name: Bug Report
description: Report a problem with the ecks RPG Framework
title: "[Bug] "
labels:
  - bug
  - help wanted
body:

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before creating this report.
          required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (Crash / Data Loss)
        - Major (System unusable)
        - Moderate (Feature impaired)
        - Minor (Visual / Cosmetic)

  - type: input
    id: version
    attributes:
      label: Engine Version
      description: What version of ecks are you using?
      placeholder: v0.52.196
    validations:
      required: true

  - type: dropdown
    id: worked_before
    attributes:
      label: Has this worked before?
      description: Did this feature work correctly in an earlier version?
      options:
        - "Yes"
        - "No"
        - "I don't know"
    validations:
      required: true

  - type: input
    id: last_working_version
    attributes:
      label: Last Known Working Version (Optional)
      description: If it worked before, which version was the last one where it worked correctly?
      placeholder: "Example: v0.52.194"

  - type: checkboxes
    id: system
    attributes:
      label: Affected System
      description: Which major system is affected?
      options:
        - label: Core Framework
        - label: Addons
        - label: Data
        - label: Economy
        - label: Entity
        - label: Launch
        - label: Loot
        - label: Progression
        - label: UI
        - label: World
        - label: Documentation
        - label: Other
    validations:
      required: true

  - type: input
    id: subsystem
    attributes:
      label: Affected Subsystem
      description: If known, specify the subsystem.
      placeholder: "Example: Chunks, Teleporter, Inventory"

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What should happen?
      placeholder: |
        Teleporters should load the destination chunk before moving the player.

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: What happens instead?
      placeholder: |
        Player is moved, but chunk data does not load correctly.

  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: How can this issue be reproduced?
      placeholder: |
        1. Open menu
        2. Perform action
        3. Observe issue

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Logs
      description: Add screenshots, errors, or logs if available.
