name: Bug Report
description: Report a problem with the ecks RPG Framework
title: "[Bug] "
labels:
  - bug
body:

  - type: input
    id: version
    attributes:
      label: Engine Version
      description: What version of ecks are you using?
      placeholder: v0.52.196
    validations:
      required: true

  - type: checkboxes
    id: system
    attributes:
      label: Affected System
      description: Which major system is affected?
      options:
        - label: Core Framework
        - label: Addons
        - label: Data
        - label: Economy
        - label: Entity
        - label: Launch
        - label: Loot
        - label: Progression
        - label: UI
        - label: World
        - label: Documentation
        - label: Other
    validations:
      required: true

  - type: checkboxes
    id: subsystem
    attributes:
      label: Affected Subsystem
      description: Which specific area is affected?
      options:
        - label: Item Creator
        - label: XP Analyzer
        - label: Databases
        - label: Generators
        - label: Templates
        - label: Crafting
        - label: Currency
        - label: Shops
        - label: Trading
        - label: Behaviors
        - label: Characters
        - label: Class
        - label: Combat
        - label: Difficulty
        - label: Effects
        - label: NPC
        - label: Stats
        - label: XP
        - label: Bootloader
        - label: Title Screen
        - label: Start Menu
        - label: World Injector
        - label: Chests
        - label: Equipment
        - label: Inventory
        - label: Items
        - label: Achievements
        - label: Dialogue
        - label: Quests
        - label: HUD
        - label: Menus
        - label: Runtime
        - label: Map Change
        - label: Chunks
        - label: Destroyables
        - label: Environment Audio
        - label: Environment Weather
        - label: Maps
        - label: Teleporter
        - label: Other

  - type: textarea
    id: issue
    attributes:
      label: Description
      description: Explain the issue.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: How can this issue be reproduced?
      placeholder: |
        1. Open menu
        2. Perform action
        3. Observe issue

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Logs
      description: Add screenshots, errors, or logs if available.
