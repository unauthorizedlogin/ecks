name: Feature Request
description: Suggest an improvement or new capability for the ecks RPG Framework
title: "[Feature] "
labels:
  - enhancement
  - needs-triage
body:

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before creating this request.
          required: true

  - type: dropdown
    id: feature_type
    attributes:
      label: Feature Type
      options:
        - New System
        - Existing System Enhancement
        - Workflow Improvement
        - Tooling
        - Documentation
        - Performance
        - Other

  - type: textarea
    id: feature
    attributes:
      label: Feature Description
      description: Describe the feature or improvement you would like to see added.
      placeholder: |
        Example:
        Add support for chained dialogue conditions based on quest state.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Motivation
      description: What problem does this solve, or what gameplay/development need does it address?
      placeholder: |
        Explain why this feature would be useful.
    validations:
      required: true

  - type: checkboxes
    id: system
    attributes:
      label: Affected System
      description: Which major system is affected?
      options:
        - label: Core Framework
        - label: Addons
        - label: Data
        - label: Economy
        - label: Entity
        - label: Launch
        - label: Loot
        - label: Progression
        - label: UI
        - label: World
        - label: Documentation
        - label: Other
    validations:
      required: true

  - type: input
    id: subsystem
    attributes:
      label: Affected Subsystem
      description: If known, specify the subsystem.
      placeholder: "Example: Chunks, Teleporter, Inventory"

  - type: textarea
    id: solution
    attributes:
      label: Suggested Design
      description: If you have an idea for how this could work, describe it here.
      placeholder: |
        Explain your suggested approach, workflow, or implementation idea.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Are there other approaches or workarounds you considered?

  - type: textarea
    id: examples
    attributes:
      label: Additional Context
      description: Add screenshots, examples from other games, links, or additional context.

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Would you like to help with this feature?
      options:
        - label: I would like to help test this feature
        - label: I would like to help document this feature
        - label: I would like to contribute code for this feature
